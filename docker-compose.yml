version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cuidaja-postgres
    environment:
      POSTGRES_DB: cuidaja
      POSTGRES_USER: cuidaja
      POSTGRES_PASSWORD: cuidaja123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuidaja"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
